<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur TVA gratuit (HT ↔ TTC rapide)</title>
<meta name="description" content="Calculez facilement la TVA, HT et TTC en ligne gratuitement.">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background: radial-gradient(circle at top, #111 0%, #000 100%); }
.glow { box-shadow: 0 0 40px rgba(255,255,255,0.05); }
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md text-center">

<h1 class="text-3xl font-bold mb-6">Calculateur TVA</h1>

<div class="bg-zinc-900/60 p-6 rounded-2xl glow border border-zinc-800">

<input id="amount" type="number" placeholder="Montant"
class="w-full p-4 mb-3 bg-zinc-800 rounded-xl"/>

<select id="tva" class="w-full p-4 bg-zinc-800 rounded-xl">
<option value="20">TVA 20%</option>
<option value="10">TVA 10%</option>
<option value="5.5">TVA 5.5%</option>
</select>

<p class="mt-6 text-zinc-400">Résultat TTC</p>
<p id="result" class="text-3xl font-bold mt-2">0 €</p>

</div>

<p class="mt-6 text-sm text-zinc-400 text-left">
Calculez rapidement le montant TTC ou HT avec ce calculateur TVA simple et rapide.
</p>

<a href="/" class="block mt-6 text-zinc-500 hover:text-white">← Retour</a>

</div>

<script>
const amount=document.getElementById("amount");
const tva=document.getElementById("tva");
const result=document.getElementById("result");

function calc(){
 let a=parseFloat(amount.value);
 let t=parseFloat(tva.value);
 if(!a){result.textContent="0 €";return;}
 result.textContent=(a*(1+t/100)).toFixed(2)+" €";
}

amount.addEventListener("input",calc);
tva.addEventListener("change",calc);
</script>

</body>
</html>
