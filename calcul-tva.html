<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculateur TVA</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
</style>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

  <h1 class="text-3xl font-bold mb-6 text-center">
    Calculateur TVA
  </h1>

  <!-- INPUT -->
  <div class="bg-zinc-900 rounded-2xl p-6 shadow-xl">
    
    <label class="text-sm text-zinc-400">Montant (€)</label>
    <input 
      id="amount"
      type="number"
      placeholder="100"
      class="w-full mt-2 p-4 rounded-xl bg-zinc-800 text-white text-lg outline-none focus:ring-2 ring-white/20"
    />

    <!-- SELECT TVA -->
    <select id="tva" class="w-full mt-4 p-4 rounded-xl bg-zinc-800">
      <option value="20">TVA 20%</option>
      <option value="10">TVA 10%</option>
      <option value="5.5">TVA 5.5%</option>
      <option value="2.1">TVA 2.1%</option>
    </select>

    <!-- RESULT -->
    <div class="mt-6 text-center">
      <p class="text-zinc-400">Résultat TTC</p>
      <p id="result" class="text-3xl font-bold mt-2">0 €</p>
    </div>

    <!-- COPY BUTTON -->
    <button onclick="copyResult()" 
      class="mt-6 w-full bg-white text-black p-3 rounded-xl font-semibold hover:opacity-90 transition">
      Copier le résultat
    </button>

  </div>

</div>

<script>

const amountInput = document.getElementById("amount");
const tvaSelect = document.getElementById("tva");
const result = document.getElementById("result");

function calculate() {
  const amount = parseFloat(amountInput.value);
  const tva = parseFloat(tvaSelect.value);

  if (!amount) {
    result.textContent = "0 €";
    return;
  }

  const ttc = amount * (1 + tva / 100);

  animateValue(parseFloat(result.textContent), ttc, 300);
}

amountInput.addEventListener("input", calculate);
tvaSelect.addEventListener("change", calculate);

function animateValue(start, end, duration) {
  let startTime = null;

  function animation(currentTime) {
    if (!startTime) startTime = currentTime;
    const progress = Math.min((currentTime - startTime) / duration, 1);

    const value = start + (end - start) * progress;
    result.textContent = value.toFixed(2) + " €";

    if (progress < 1) {
      requestAnimationFrame(animation);
    }
  }

  requestAnimationFrame(animation);
}

function copyResult() {
  navigator.clipboard.writeText(result.textContent);
  alert("Copié !");
}

</script>

</body>
</html>
