<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur Salaire Net Brut</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

<h1 class="text-3xl font-bold text-center mb-6">
Simulateur Salaire Net
</h1>

<div class="bg-zinc-900 p-6 rounded-2xl">

<label class="text-zinc-400">Salaire brut (€)</label>
<input id="brut" type="number" placeholder="2000"
class="w-full mt-2 p-4 bg-zinc-800 rounded-xl text-lg"/>

<div class="mt-6 text-center">
<p class="text-zinc-400">Net estimé</p>
<p id="result" class="text-3xl font-bold mt-2">0 €</p>
</div>

</div>
</div>

<script>
const brutInput = document.getElementById("brut");
const result = document.getElementById("result");

brutInput.addEventListener("input", () => {
  const brut = parseFloat(brutInput.value);
  if (!brut) {
    result.textContent = "0 €";
    return;
  }

  const net = brut * 0.78; // approximation FR
  result.textContent = net.toFixed(0) + " €";
});
</script>

</body>
</html>
