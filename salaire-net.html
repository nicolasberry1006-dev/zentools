<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur salaire net brut (heure, mois, année)</title>
<meta name="description" content="Convertissez votre salaire brut en net et entre formats horaire, mensuel et annuel.">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background: radial-gradient(circle at top, #111 0%, #000 100%); }
.glow { box-shadow: 0 0 40px rgba(255,255,255,0.05); }
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md text-center">

<h1 class="text-3xl font-bold mb-6">Salaire Brut → Net</h1>

<div class="bg-zinc-900/60 p-6 rounded-2xl glow border border-zinc-800">

<select id="mode" class="w-full p-4 mb-4 bg-zinc-800 rounded-xl">
<option value="hour">Horaire (€ / h)</option>
<option value="month">Mensuel (€ / mois)</option>
<option value="year">Annuel (€ / an)</option>
</select>

<input id="input" type="number" placeholder="Ex: 14"
class="w-full p-4 bg-zinc-800 rounded-xl text-lg"/>

<div class="mt-6 text-left text-sm space-y-2">

<p>Horaire : <span id="hourly">0 €</span></p>
<p>Mensuel : <span id="monthly">0 €</span></p>
<p>Annuel : <span id="yearly">0 €</span></p>

<p class="mt-4 text-zinc-400">Net mensuel estimé :</p>
<p id="net" class="text-2xl font-bold">0 €</p>

</div>

</div>

<a href="/" class="block mt-6 text-zinc-500 hover:text-white">← Retour</a>

</div>

<script>
const input = document.getElementById("input");
const mode = document.getElementById("mode");

const hourly = document.getElementById("hourly");
const monthly = document.getElementById("monthly");
const yearly = document.getElementById("yearly");
const net = document.getElementById("net");

const HOURS_MONTH = 151.67;
const MONTHS_YEAR = 12;
const NET_RATE = 0.78;

function calc() {
  let value = parseFloat(input.value);

  if (!value) {
    hourly.textContent = monthly.textContent = yearly.textContent = net.textContent = "0 €";
    return;
  }

  let brutHourly, brutMonthly, brutYearly;

  if (mode.value === "hour") {
    brutHourly = value;
    brutMonthly = value * HOURS_MONTH;
    brutYearly = brutMonthly * MONTHS_YEAR;
  }

  if (mode.value === "month") {
    brutMonthly = value;
    brutHourly = value / HOURS_MONTH;
    brutYearly = value * MONTHS_YEAR;
  }

  if (mode.value === "year") {
    brutYearly = value;
    brutMonthly = value / MONTHS_YEAR;
    brutHourly = brutMonthly / HOURS_MONTH;
  }

  hourly.textContent = brutHourly.toFixed(2) + " €";
  monthly.textContent = brutMonthly.toFixed(0) + " €";
  yearly.textContent = brutYearly.toFixed(0) + " €";

  net.textContent = (brutMonthly * NET_RATE).toFixed(0) + " €";
}

input.addEventListener("input", calc);
mode.addEventListener("change", calc);
</script>

</body>
</html>
