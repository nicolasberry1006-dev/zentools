<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur salaire net brut</title>
<meta name="description" content="Calculez votre salaire net mensuel, annuel et horaire.">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background: radial-gradient(circle at top, #111 0%, #000 100%); }
.glow { box-shadow: 0 0 40px rgba(255,255,255,0.05); }
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md text-center">

<h1 class="text-3xl font-bold mb-6">Salaire Net</h1>

<div class="bg-zinc-900/60 p-6 rounded-2xl glow border border-zinc-800">

<select id="mode" class="w-full p-4 mb-3 bg-zinc-800 rounded-xl">
<option value="month">Mensuel</option>
<option value="year">Annuel</option>
<option value="hour">Horaire</option>
</select>

<input id="brut" type="number" placeholder="Salaire brut"
class="w-full p-4 bg-zinc-800 rounded-xl"/>

<p class="mt-6 text-zinc-400">Net estimé</p>
<p id="result" class="text-3xl font-bold mt-2">0 €</p>

</div>

<a href="/" class="block mt-6 text-zinc-500 hover:text-white">← Retour</a>

</div>

<script>
const brut=document.getElementById("brut");
const mode=document.getElementById("mode");
const result=document.getElementById("result");

function calc(){
 let b=parseFloat(brut.value);
 if(!b){result.textContent="0 €";return;}
 let m = mode.value==="year"?b/12:mode.value==="hour"?b*151.67:b;
 result.textContent=(m*0.78).toFixed(0)+" €";
}

brut.addEventListener("input",calc);
mode.addEventListener("change",calc);
</script>

</body>
</html>
