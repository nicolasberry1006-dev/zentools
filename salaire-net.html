<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur salaire brut net (heure, mois, année)</title>
<meta name="description" content="Convertissez votre salaire brut en net et entre formats horaire, mensuel et annuel.">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background: radial-gradient(circle at top, #111 0%, #000 100%); }
.glow { box-shadow: 0 0 40px rgba(255,255,255,0.05); }
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md text-center">

<h1 class="text-3xl font-bold mb-6">Salaire Brut → Net</h1>

<div class="bg-zinc-900/60 p-6 rounded-2xl glow border border-zinc-800">

<select id="mode" class="w-full p-4 mb-4 bg-zinc-800 rounded-xl">
<option value="hour">Horaire (€ / h)</option>
<option value="month">Mensuel (€ / mois)</option>
<option value="year">Annuel (€ / an)</option>
</select>

<input id="input" type="number" placeholder="Ex: 14"
class="w-full p-4 mb-6 bg-zinc-800 rounded-xl text-lg"/>

<!-- TABLEAU -->
<div class="overflow-hidden rounded-xl border border-zinc-800">

<table class="w-full text-sm">

<thead class="bg-zinc-800 text-zinc-400">
<tr>
<th class="p-3 text-left">Type</th>
<th class="p-3 text-right">Brut</th>
<th class="p-3 text-right">Net</th>
</tr>
</thead>

<tbody>

<tr class="border-t border-zinc-800">
<td class="p-3">Horaire</td>
<td class="p-3 text-right" id="hourlyBrut">0 €</td>
<td class="p-3 text-right text-green-400" id="hourlyNet">0 €</td>
</tr>

<tr class="border-t border-zinc-800">
<td class="p-3">Mensuel</td>
<td class="p-3 text-right" id="monthlyBrut">0 €</td>
<td class="p-3 text-right text-green-400" id="monthlyNet">0 €</td>
</tr>

<tr class="border-t border-zinc-800">
<td class="p-3">Annuel</td>
<td class="p-3 text-right" id="yearlyBrut">0 €</td>
<td class="p-3 text-right text-green-400" id="yearlyNet">0 €</td>
</tr>

</tbody>
</table>

</div>

</div>

<a href="/" class="block mt-6 text-zinc-500 hover:text-white">← Retour</a>

</div>

<script>
const input = document.getElementById("input");
const mode = document.getElementById("mode");

const hourlyBrut = document.getElementById("hourlyBrut");
const monthlyBrut = document.getElementById("monthlyBrut");
const yearlyBrut = document.getElementById("yearlyBrut");

const hourlyNet = document.getElementById("hourlyNet");
const monthlyNet = document.getElementById("monthlyNet");
const yearlyNet = document.getElementById("yearlyNet");

const HOURS_MONTH = 151.67;
const MONTHS_YEAR = 12;
const NET_RATE = 0.78;

function calc() {
  let value = parseFloat(input.value);

  if (!value) {
    hourlyBrut.textContent = monthlyBrut.textContent = yearlyBrut.textContent = "0 €";
    hourlyNet.textContent = monthlyNet.textContent = yearlyNet.textContent = "0 €";
    return;
  }

  let brutHourly, brutMonthly, brutYearly;

  if (mode.value === "hour") {
    brutHourly = value;
    brutMonthly = value * HOURS_MONTH;
    brutYearly = brutMonthly * MONTHS_YEAR;
  }

  if (mode.value === "month") {
    brutMonthly = value;
    brutHourly = value / HOURS_MONTH;
    brutYearly = value * MONTHS_YEAR;
  }

  if (mode.value === "year") {
    brutYearly = value;
    brutMonthly = value / MONTHS_YEAR;
    brutHourly = brutMonthly / HOURS_MONTH;
  }

  let netHourly = brutHourly * NET_RATE;
  let netMonthly = brutMonthly * NET_RATE;
  let netYearly = brutYearly * NET_RATE;

  hourlyBrut.textContent = brutHourly.toFixed(2) + " €";
  monthlyBrut.textContent = brutMonthly.toFixed(0) + " €";
  yearlyBrut.textContent = brutYearly.toFixed(0) + " €";

  hourlyNet.textContent = netHourly.toFixed(2) + " €";
  monthlyNet.textContent = netMonthly.toFixed(0) + " €";
  yearlyNet.textContent = netYearly.toFixed(0) + " €";
}

input.addEventListener("input", calc);
mode.addEventListener("change", calc);
</script>

</body>
</html>
