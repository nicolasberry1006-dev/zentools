<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur de devises</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #111 0%, #000 100%);
}
.glow {
  box-shadow: 0 0 40px rgba(255,255,255,0.05);
}
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md text-center">

<h1 class="text-3xl font-bold mb-6">Convertisseur de devises</h1>

<div class="bg-zinc-900/60 backdrop-blur p-6 rounded-2xl glow border border-zinc-800">

<input id="amount" type="number" placeholder="Montant"
class="w-full p-4 mb-4 bg-zinc-800 rounded-xl text-lg"/>

<select id="from" class="w-full p-4 mb-3 bg-zinc-800 rounded-xl">
<option value="EUR">Euro (€)</option>
<option value="USD">Dollar ($)</option>
<option value="GBP">Livre (£)</option>
<option value="CHF">Franc suisse</option>
<option value="JPY">Yen</option>
</select>

<select id="to" class="w-full p-4 mb-4 bg-zinc-800 rounded-xl">
<option value="USD">Dollar ($)</option>
<option value="EUR">Euro (€)</option>
<option value="GBP">Livre (£)</option>
<option value="CHF">Franc suisse</option>
<option value="JPY">Yen</option>
</select>

<div class="text-center mt-6">
<p class="text-zinc-400">Résultat</p>
<p id="result" class="text-3xl font-bold mt-2">0</p>
</div>

</div>

</div>

<script>
const rates = {
  EUR: 1,
  USD: 1.08,
  GBP: 0.86,
  CHF: 0.95,
  JPY: 170
};

const amount = document.getElementById("amount");
const from = document.getElementById("from");
const to = document.getElementById("to");
const result = document.getElementById("result");

function convert() {
  const value = parseFloat(amount.value);
  if (!value) {
    result.textContent = "0";
    return;
  }

  const fromRate = rates[from.value];
  const toRate = rates[to.value];

  const converted = (value / fromRate) * toRate;

  result.textContent = converted.toFixed(2);
}

amount.addEventListener("input", convert);
from.addEventListener("change", convert);
to.addEventListener("change", convert);
</script>

</body>
</html>
